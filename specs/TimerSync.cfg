SPECIFICATION Spec

\* Safety: these must ALWAYS hold
INVARIANT
    TimerAgreement
    NoDoubleProcess
    BoundedTimerDisagreement

\* Liveness: these must EVENTUALLY hold
PROPERTY
    AllAnsweredImpliesAdvance
    ClientsEventuallySync

\* Small constants to keep state space tractable
CONSTANTS
    Players = {p1, p2}
    MaxClockSkew = 2
    TimerDuration = 3

\* Players are interchangeable — reduce state space
SYMMETRY PlayerSymmetry
