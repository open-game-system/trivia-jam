name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Remix
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start app (wrangler dev)
        run: |
          npx wrangler dev --port 8787 --local &
          echo "Waiting for app on http://127.0.0.1:8787..."
          npx wait-on tcp:127.0.0.1:8787 --timeout 60000
        env:
          NODE_ENV: production

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: true
