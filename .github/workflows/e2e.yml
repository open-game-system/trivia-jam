name: E2E Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Start app
        run: |
          npx wrangler dev -c .output/server/wrangler.json --port 8787 --inspector-port 0 &
          echo "Waiting for app on http://127.0.0.1:8787..."
          npx wait-on tcp:127.0.0.1:8787 --timeout 60000
        env:
          NODE_ENV: production

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: true
